name: Deploy to AWS ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

# ── OIDC permissions — no long-lived AWS keys needed ────────────────────────
permissions:
  id-token: write   # required for OIDC token exchange with AWS
  contents: read

env:
  AWS_REGION:               us-east-1
  ECR_API_REPOSITORY:       hal-docs-api
  ECR_FRONTEND_REPOSITORY:  hal-docs-frontend
  ECS_CLUSTER:              hal-docs-cluster
  ECS_API_SERVICE:          hal-docs-api
  ECS_FRONTEND_SERVICE:     hal-docs-frontend
  API_TASK_FAMILY:          hal-docs-api
  FRONTEND_TASK_FAMILY:     hal-docs-frontend

jobs:
  # ── Test: Ruby ───────────────────────────────────────────────────────────────
  test-ruby:
    name: RSpec
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER:     hal_docs
          POSTGRES_PASSWORD: password
          POSTGRES_DB:       hal_docs_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Run RSpec
        env:
          DATABASE_URL:     postgresql://hal_docs:password@localhost/hal_docs_test
          RAILS_ENV:        test
          RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
        run: bundle exec rspec --format progress

  # ── Test: Frontend ───────────────────────────────────────────────────────────
  test-frontend:
    name: Vitest + type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Vitest
        run: npm test -- --run

  # ── Build & Push images ───────────────────────────────────────────────────────
  build:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: [test-ruby, test-frontend]
    outputs:
      api_image:      ${{ steps.build-api.outputs.image }}
      frontend_image: ${{ steps.build-frontend.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume:  arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region:      ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        id: build-api
        uses: docker/build-push-action@v6
        with:
          context:     .
          push:        true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_API_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_API_REPOSITORY }}:latest
          # Cache layers in ECR — no extra S3 bucket needed
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_API_REPOSITORY }}:cache
          cache-to:   type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_API_REPOSITORY }}:cache,mode=max

      - name: Build and push frontend image
        id: build-frontend
        uses: docker/build-push-action@v6
        with:
          context:     ./frontend
          push:        true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_FRONTEND_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_FRONTEND_REPOSITORY }}:latest
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_FRONTEND_REPOSITORY }}:cache
          cache-to:   type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_FRONTEND_REPOSITORY }}:cache,mode=max

      - name: Export image URIs
        run: |
          echo "api_image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_API_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "frontend_image=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_FRONTEND_REPOSITORY }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
        id: export-images

  # ── Run DB migrations ─────────────────────────────────────────────────────────
  migrate:
    name: Run DB migrations
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region:     ${{ env.AWS_REGION }}

      - name: Run rails db:migrate as one-off ECS task
        run: |
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $API_TASK_FAMILY \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          SUBNETS=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_API_SERVICE \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.subnets' \
            --output json)

          SG=$(aws ecs describe-services \
            --cluster $ECS_CLUSTER \
            --services $ECS_API_SERVICE \
            --query 'services[0].networkConfiguration.awsvpcConfiguration.securityGroups' \
            --output json)

          TASK_ARN=$(aws ecs run-task \
            --cluster $ECS_CLUSTER \
            --task-definition "$TASK_DEF" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=$SUBNETS,securityGroups=$SG,assignPublicIp=DISABLED}" \
            --overrides '{"containerOverrides":[{"name":"api","command":["bundle","exec","rails","db:migrate"]}]}' \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task: $TASK_ARN"
          aws ecs wait tasks-stopped --cluster $ECS_CLUSTER --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster $ECS_CLUSTER \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration task exited with code $EXIT_CODE"
            exit 1
          fi

  # ── Deploy API ────────────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API to ECS
    runs-on: ubuntu-latest
    needs: [build, migrate]
    environment: production

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region:     ${{ env.AWS_REGION }}

      - name: Download current API task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $API_TASK_FAMILY \
            --query taskDefinition \
            > /tmp/api-task-definition.json

      - name: Update API task definition with new image
        id: task-def-api
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: /tmp/api-task-definition.json
          container-name:  api
          image:           ${{ needs.build.outputs.api_image }}

      - name: Deploy API to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:            ${{ steps.task-def-api.outputs.task-definition }}
          service:                    ${{ env.ECS_API_SERVICE }}
          cluster:                    ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

  # ── Deploy Frontend ───────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend to ECS
    runs-on: ubuntu-latest
    needs: [build, deploy-api]
    environment: production

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region:     ${{ env.AWS_REGION }}

      - name: Download current frontend task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $FRONTEND_TASK_FAMILY \
            --query taskDefinition \
            > /tmp/frontend-task-definition.json

      - name: Update frontend task definition with new image
        id: task-def-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: /tmp/frontend-task-definition.json
          container-name:  frontend
          image:           ${{ needs.build.outputs.frontend_image }}

      - name: Deploy frontend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:            ${{ steps.task-def-frontend.outputs.task-definition }}
          service:                    ${{ env.ECS_FRONTEND_SERVICE }}
          cluster:                    ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
