name: hal-docs

# ─────────────────────────────────────────────────────────────────────────────
# Local production-like stack.
# Copy .env.example → .env and fill in the required values before running.
# Usage:
#   docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: hal_docs
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: hal_docs_production
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hal_docs"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Rails API ───────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://hal_docs:${DB_PASSWORD:-password}@db/hal_docs_production
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      # Allow the frontend Nginx container to call the API (same origin in prod)
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-info}
      # Active Storage — use local disk when AWS credentials are not set
      AWS_REGION: ${AWS_REGION:-}
      AWS_BUCKET: ${AWS_BUCKET:-}
    depends_on:
      db:
        condition: service_healthy
    # Not exposed to host — accessed only through the frontend Nginx proxy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/up || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── React Frontend (Nginx) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # Resolved by Docker's internal DNS to the api service
      API_URL: http://api
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${APP_PORT:-80}:80"

volumes:
  pgdata:
